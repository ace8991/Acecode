# 🦞 Acecode Configuration

ai:
  provider: openai           # openai | anthropic | ollama | local
  model: gpt-4o
  temperature: 0.7
  max_tokens: 4096

interface:
  mode: api                  # cli | api | gui
  port: 8080
  host: 0.0.0.0

privacy:
  local_mode: false          # Run entirely offline with a local model
  log_conversations: false

plugins:
  enabled: []
